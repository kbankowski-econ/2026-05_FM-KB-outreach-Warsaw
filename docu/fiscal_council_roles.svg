<text x="170.0" y="346.5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#4A148C" text-anchor="start">Sustainability Safeguards</text>
<text x="170.0" y="367.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">Conducts regular debt sustainability analyses (DSA) to ensure national fiscal policy remains consistent with</text>
<text x="170.0" y="388.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">long-term objectives and the new EU framework.</text>
