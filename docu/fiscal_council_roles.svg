<rect x="106" y="249.0" width="24" height="25" rx="3" fill="none" stroke="#6A1B9A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><rect x="113" y="244.0" width="10" height="7" rx="2" fill="none" stroke="#6A1B9A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="112,262.0 117,267.0 125,256.0" fill="none" stroke="#6A1B9A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="170.0" y="248.5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#4A148C" text-anchor="start">Compliance Oversight</text>
<text x="170.0" y="269.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">Provides detailed ex-ante and ex-post assessments of adherence to the SER, bridging the current gap in independent</text>
<text x="170.0" y="290.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">retrospective and prospective analysis.</text>
