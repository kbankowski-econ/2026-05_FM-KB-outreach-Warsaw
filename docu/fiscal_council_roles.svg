<rect x="40.0" y="118.5" width="18.0" height="87.0" rx="12" ry="12" fill="#6A1B9A"/>
<rect x="46.0" y="118.5" width="12.0" height="87.0" rx="12" ry="12" fill="#F6EFFA"/>
