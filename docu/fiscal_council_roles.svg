<text x="170.0" y="444.5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#4A148C" text-anchor="start">Institutional Autonomy</text>
<text x="170.0" y="465.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">Requires full operational independence and sufficient resources to provide an authoritative, “single voice” on</text>
<text x="170.0" y="486.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">fiscal transparency and discipline.</text>
