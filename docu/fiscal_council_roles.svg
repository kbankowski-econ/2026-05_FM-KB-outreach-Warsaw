<text x="170.0" y="150.5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#4A148C" text-anchor="start">Escape Clause Stewardship</text>
<text x="170.0" y="171.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">Monitors the activation and extension of escape clauses, assesses the costing of extraordinary measures, and</text>
<text x="170.0" y="192.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">oversees the return path to rule limits.</text>
<rect x="40.0" y="216.5" width="1200.0" height="87.0" rx="12" ry="12" fill="#F6EFFA"/>
<rect x="40.0" y="216.5" width="18.0" height="87.0" rx="12" ry="12" fill="#6A1B9A"/>
