<text x="170.0" y="52.5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#4A148C" text-anchor="start">Macro-Fiscal Evaluation</text>
<text x="170.0" y="73.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">Mandated to evaluate the quality and realism of the macro-fiscal projections that underpin the Medium-Term Fiscal</text>
<text x="170.0" y="94.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="normal" fill="#3A3A3A" text-anchor="start">Framework and the SER formula.</text>
